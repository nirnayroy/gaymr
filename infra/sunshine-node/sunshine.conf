# Sunshine config for step-1 verification.
# Latency-tuned for browser viewing via moonlight-web bridge.
# Override target bitrate from the client (Moonlight/web) — values here are caps.

# --- core ---
sunshine_name = gaymr-mumbai-step1
min_log_level = info
port = 47989

# --- display ---
output_name = 0
fps = [60, 30]
resolutions = [
  1920x1080,
  1280x720,
]

# --- encoder ---
# nvenc_preset p1 = lowest latency NVENC preset
encoder = nvenc
nvenc_preset = p1
nvenc_twopass = disabled
nvenc_h264_cavlc = disabled

# Zero B-frames, GOP=1s @60fps — matches the latency budget in the handoff doc.
qp = 28
min_threads = 2

# --- bitrate caps ---
# 15 Mbps is comfortable on a 43 Mbps downlink with headroom for spikes.
# Sunshine clients typically negotiate down; this is the ceiling.
fec_percentage = 20

# --- audio ---
audio_sink = pulse
