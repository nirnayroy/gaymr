# Xorg config for headless NVIDIA on g4dn/g5/g6 EC2.
# Drives a virtual 1920x1080@60 display so Sunshine + NVFBC can capture
# real OpenGL/Vulkan output from the GPU.
#
# __GPU_BUS_ID__ is replaced at provision time by `nvidia-xconfig --query-gpu-info`.

Section "ServerLayout"
    Identifier     "Layout0"
    Screen      0  "Screen0"
EndSection

Section "Monitor"
    Identifier     "Monitor0"
    HorizSync       28.0 - 33.0
    VertRefresh     43.0 - 72.0
    ModeLine       "1920x1080" 148.50 1920 2008 2052 2200 1080 1084 1089 1125 +hsync +vsync
    Option         "DPMS"
EndSection

Section "Device"
    Identifier     "Device0"
    Driver         "nvidia"
    VendorName     "NVIDIA Corporation"
    BusID          "__GPU_BUS_ID__"
    Option         "AllowEmptyInitialConfiguration" "true"
    Option         "ConnectedMonitor" "DFP-0"
    Option         "ModeValidation" "NoDFPNativeResolutionCheck,AllowNonEdidModes,NoVesaModes"
EndSection

Section "Screen"
    Identifier     "Screen0"
    Device         "Device0"
    Monitor        "Monitor0"
    DefaultDepth    24
    Option         "AllowEmptyInitialConfiguration" "true"
    SubSection "Display"
        Depth       24
        Modes      "1920x1080"
    EndSubSection
EndSection
